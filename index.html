<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Englisch Unit 3 — South Africa</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#090b10;--s1:#0f1118;--s2:#141720;--card:#191c28;
  --brd:rgba(255,255,255,.07);--brd2:rgba(255,255,255,.13);
  --tx:#eef0f8;--mu:#7a7e96;--hi:#35384f;
  --bl:#4f9dff;--gr:#35d498;--or:#ff9248;--rd:#ff5c5c;--pu:#a98aff;--ye:#fbbf24;
  --lbl:rgba(79,157,255,.12);--lgr:rgba(53,212,152,.12);--lor:rgba(255,146,72,.12);
  --lrd:rgba(255,92,92,.12);--lpu:rgba(169,138,255,.12);--lye:rgba(251,191,36,.12)
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* TOP BAR */
.topbar{background:var(--s1);border-bottom:1px solid var(--brd);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:300}
.logo{font-size:13px;font-weight:900;color:#fff}
.logo em{font-style:normal;background:linear-gradient(90deg,var(--bl),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cd{display:flex;gap:4px}
.cd-box{background:var(--s2);border:1px solid var(--brd2);border-radius:7px;padding:3px 7px;text-align:center;min-width:38px}
.cd-n{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;line-height:1.1;transition:transform .15s}
.cd-u{font-size:7px;color:var(--mu);font-weight:700;text-transform:uppercase}
.cd-box.urg{border-color:rgba(255,92,92,.4);background:var(--lrd)}
.cd-box.urg .cd-n{color:var(--rd)}

/* PROGRESS PILLS */
.pills{display:flex;gap:6px;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--brd);overflow-x:auto}
.pill{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--brd);font-size:11px;font-weight:800;cursor:pointer;transition:all .15s;color:var(--mu);background:transparent}
.pill:hover{border-color:var(--brd2);color:var(--tx)}
.pill.done{border-color:var(--gr);color:var(--gr);background:rgba(53,212,152,.08)}
.pill.active{border-color:var(--bl);color:var(--bl);background:rgba(79,157,255,.08)}
.pill.locked{opacity:.3;cursor:not-allowed}
.pill-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}

/* MAIN */
.wrap{max-width:700px;margin:0 auto;padding:16px 13px 90px}

/* SCREENS */
.sc{display:none}.sc.on{display:block}

/* HOME HERO */
.home-hero{background:linear-gradient(135deg,#0e1428 0%,#09131e 100%);border:1px solid rgba(79,157,255,.15);border-radius:18px;padding:22px 20px;margin-bottom:14px;text-align:center}
.home-hero .flag{font-size:44px;margin-bottom:8px}
.home-hero h1{font-size:21px;font-weight:900;margin-bottom:5px}
.home-hero h1 em{font-style:normal;color:var(--bl)}
.home-hero p{font-size:12px;color:var(--mu);font-weight:600;line-height:1.7;margin-bottom:14px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:10px;padding:10px 6px;text-align:center}
.stat-n{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700}
.stat-l{font-size:10px;color:var(--mu);font-weight:700;margin-top:2px}

/* TOPIC ITEMS */
.tlist{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.titem{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.titem::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0}
.titem.done::before{background:var(--gr)}
.titem.active::before{background:var(--bl)}
.titem.locked::before{background:var(--hi)}
.titem:hover:not(.locked){transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.35);border-color:var(--brd2)}
.titem.locked{opacity:.38;cursor:not-allowed}
.titem-ico{font-size:26px;flex-shrink:0}
.titem-body{flex:1;min-width:0}
.titem-title{font-size:13px;font-weight:800;margin-bottom:2px}
.titem-sub{font-size:11px;color:var(--mu);font-weight:600}
.titem-bar{height:3px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:7px;overflow:hidden}
.titem-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.titem-tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;flex-shrink:0}
.titem-tag.done{background:rgba(53,212,152,.15);color:var(--gr)}
.titem-tag.go{background:rgba(79,157,255,.15);color:var(--bl)}
.titem-tag.retry{background:rgba(255,146,72,.15);color:var(--or)}
.titem-tag.locked{background:var(--lrd);color:var(--rd)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:15px;margin-bottom:12px}
.card-title{font-size:10px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title .badge{padding:1px 8px;border-radius:20px;font-size:9px;font-weight:900}

/* RULES */
.rule{border-radius:10px;padding:12px 14px;margin:7px 0;font-size:12.5px;font-weight:600;line-height:1.85}
.rule.b{background:var(--lbl);border:1px solid rgba(79,157,255,.2);color:#93c5fd}
.rule.g{background:var(--lgr);border:1px solid rgba(53,212,152,.2);color:#6ee7b7}
.rule.y{background:var(--lye);border:1px solid rgba(251,191,36,.2);color:#fde68a}
.rule.r{background:var(--lrd);border:1px solid rgba(255,92,92,.2);color:#fca5a5}
.rule.p{background:var(--lpu);border:1px solid rgba(169,138,255,.2);color:#c4b5fd}
.rule.o{background:var(--lor);border:1px solid rgba(255,146,72,.2);color:#fdba74}

.formula{background:#0b1625;border:1px solid rgba(79,157,255,.28);border-radius:10px;padding:13px;text-align:center;margin:9px 0;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--bl)}
.formula small{display:block;font-size:11px;color:var(--mu);margin-top:4px;font-family:'Sora',sans-serif;font-weight:600}

/* TABLE */
.t{width:100%;border-collapse:collapse;font-size:12px;margin:7px 0}
.t th{padding:7px 9px;text-align:left;font-size:10px;font-weight:800;color:var(--hi);border-bottom:1px solid var(--brd);text-transform:uppercase;letter-spacing:.04em}
.t td{padding:7px 9px;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.65;vertical-align:top}
.t tr:last-child td{border-bottom:none}
.t .de{color:var(--mu);font-style:italic}
.t .en{color:var(--tx);font-weight:600}
.t .gr{color:var(--bl);font-family:'JetBrains Mono',monospace;font-size:11px}
.t .hl{color:var(--gr);font-weight:800}

/* QUIZ */
.qwrap{background:var(--s2);border:1px solid var(--brd);border-radius:16px;padding:18px;margin-top:4px}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qtitle{font-size:13px;font-weight:800}
.qcount{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mu)}
.qbar{height:4px;background:rgba(255,255,255,.06);border-radius:4px;margin-bottom:15px;overflow:hidden}
.qbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--bl),var(--pu));transition:width .4s}
.qtext{font-size:14px;font-weight:700;line-height:1.65;margin-bottom:5px}
.qde{font-size:11px;color:var(--mu);font-weight:600;margin-bottom:13px;font-style:italic}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.opt{padding:11px 12px;border-radius:10px;border:1px solid var(--brd);background:rgba(255,255,255,.03);font-size:12px;font-weight:700;cursor:pointer;transition:all .13s;text-align:left;color:var(--tx);font-family:'Sora',sans-serif;line-height:1.5}
.opt:hover:not(:disabled){border-color:var(--bl);background:var(--lbl);color:var(--bl)}
.opt.ok{border-color:var(--gr)!important;background:var(--lgr)!important;color:var(--gr)!important}
.opt.no{border-color:var(--rd)!important;background:var(--lrd)!important;color:var(--rd)!important;animation:shake .3s}
.opt:disabled{cursor:default}
.qfb{font-size:12px;font-weight:700;min-height:18px;margin-bottom:8px}
.qfb.ok{color:var(--gr)}.qfb.no{color:var(--rd)}
.qex{background:rgba(255,255,255,.04);border-radius:8px;padding:9px 12px;font-size:12px;font-weight:600;color:var(--mu);line-height:1.7;display:none;margin-bottom:10px}
.qex.show{display:block}
.fill-inp{background:rgba(255,255,255,.05);border:1.5px solid var(--brd2);border-radius:9px;padding:10px 13px;font-size:13px;font-weight:700;color:var(--tx);width:100%;margin-bottom:8px;outline:none;font-family:'JetBrains Mono',monospace;transition:border .15s}
.fill-inp:focus{border-color:var(--bl)}
.fill-inp.ok{border-color:var(--gr)!important;background:var(--lgr)!important;color:var(--gr)!important}
.fill-inp.no{border-color:var(--rd)!important;background:var(--lrd)!important}
.chk-btn{width:100%;padding:11px;background:var(--bl);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:'Sora',sans-serif;margin-bottom:8px;transition:all .13s}
.chk-btn:hover{background:#3a8ef0}
.chk-btn:disabled{opacity:.4;cursor:not-allowed}

/* RESULT GATES */
.gate{border-radius:16px;padding:22px;text-align:center;margin-top:4px}
.gate.pass{background:rgba(53,212,152,.07);border:2px solid rgba(53,212,152,.3)}
.gate.fail{background:rgba(255,92,92,.07);border:2px solid rgba(255,92,92,.3)}
.gate .big{font-size:54px;margin-bottom:10px}
.gate h2{font-size:20px;font-weight:900;margin-bottom:6px}
.gate.pass h2{color:var(--gr)}.gate.fail h2{color:var(--rd)}
.gate p{font-size:12px;color:var(--mu);font-weight:600;line-height:1.7;margin-bottom:16px}
.btn-main{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 22px;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s;width:100%;margin-bottom:8px}
.btn-main:hover{transform:translateY(-2px)}
.btn-main.green{background:var(--gr);color:#062010}
.btn-main.blue{background:var(--bl);color:#fff}
.btn-main.orange{background:var(--or);color:#1a0800}
.btn-sec{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;background:transparent;border:1px solid var(--brd2);border-radius:10px;color:var(--mu);font-size:12px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;transition:all .13s;width:100%;margin-bottom:6px}
.btn-sec:hover{border-color:var(--bl);color:var(--bl)}

/* WRONG LIST */
.wrong-list{background:rgba(255,255,255,.03);border-radius:10px;padding:12px 13px;margin:12px 0;text-align:left}
.wrong-list div{font-size:11px;font-weight:700;color:var(--rd);padding:3px 0;line-height:1.5}

/* LEARN CONTENT */
.learn-hero{border-radius:16px;padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.learn-hero h1{font-size:19px;font-weight:900;margin-bottom:4px}
.learn-hero p{font-size:11px;opacity:.65;font-weight:600}
.lbadge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;margin-bottom:9px;text-transform:uppercase;letter-spacing:.05em}

/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--brd);display:flex;z-index:200}
.bbt{flex:1;padding:11px 5px 13px;border:none;background:none;color:var(--mu);font-size:8.5px;font-weight:800;cursor:pointer;font-family:'Sora',sans-serif;text-transform:uppercase;letter-spacing:.05em;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .13s}
.bbt svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bbt.on{color:var(--bl)}

/* TOAST */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(60px);background:#fff;color:#09090f;padding:9px 18px;border-radius:40px;font-weight:800;font-size:12px;z-index:999;transition:transform .22s;pointer-events:none;box-shadow:0 6px 28px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ALL DONE */
.alldone{text-align:center;padding:40px 16px}
.alldone .big{font-size:64px;margin-bottom:14px}
.alldone h1{font-size:24px;font-weight:900;color:var(--gr);margin-bottom:8px}
.alldone p{font-size:13px;color:var(--mu);font-weight:600;line-height:1.75;max-width:320px;margin:0 auto 20px}

/* VOCAB FLIP */
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.vcard{background:var(--card);border:1px solid var(--brd);border-radius:11px;padding:12px;cursor:pointer;transition:all .15s;min-height:64px;display:flex;flex-direction:column;justify-content:center}
.vcard:hover{border-color:var(--brd2);background:rgba(255,255,255,.04)}
.vc-de{font-size:12px;font-weight:700;color:var(--mu)}
.vc-en{display:none;font-size:13px;font-weight:800;color:var(--bl)}
.vc-tag{font-size:9px;color:var(--hi);margin-top:3px;font-weight:700}
.vcard.flip .vc-de{display:none}
.vcard.flip .vc-en{display:block}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fi{animation:fadein .3s ease forwards}

/* PLAN BANNER */
.plan{background:linear-gradient(135deg,rgba(79,157,255,.08),rgba(169,138,255,.06));border:1px solid rgba(79,157,255,.18);border-radius:12px;padding:13px 15px;margin-bottom:14px}
.plan-title{font-size:11px;font-weight:800;color:var(--bl);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.plan-items{display:flex;flex-direction:column;gap:5px}
.plan-item{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--tx)}
.plan-item .pi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.plan-item .pi-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mu);margin-left:auto}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">🌍 <em>South Africa</em> Englisch</div>
  <div class="cd">
    <div class="cd-box" id="cdd"><div class="cd-n" id="cdn-d">--</div><div class="cd-u">Tage</div></div>
    <div class="cd-box" id="cdh"><div class="cd-n" id="cdn-h">--</div><div class="cd-u">Std</div></div>
    <div class="cd-box" id="cdm"><div class="cd-n" id="cdn-m">--</div><div class="cd-u">Min</div></div>
    <div class="cd-box" id="cds"><div class="cd-n" id="cdn-s">--</div><div class="cd-u">Sek</div></div>
  </div>
</div>

<!-- PROGRESS PILLS -->
<div class="pills" id="pills"></div>

<!-- MAIN -->
<div class="wrap">
  <div class="sc on" id="sc-home"><div id="home-body"></div></div>
  <div class="sc" id="sc-learn"><div id="learn-body"></div></div>
  <div class="sc" id="sc-quiz"><div id="quiz-body"></div></div>
  <div class="sc" id="sc-voc"><div id="voc-body"></div></div>
  <div class="sc" id="sc-gram"><div id="gram-body"></div></div>
  <div class="sc" id="sc-done">
    <div class="alldone fi">
      <div class="big">🏆</div>
      <h1>Alles fertig!</h1>
      <p>Du hast alle Themen gemeistert und bist bereit für die Klassenarbeit am <strong>28.05.2026</strong>! Mach kurz vorher nochmal eine schnelle Runde zur Sicherheit.</p>
      <button class="btn-main green" onclick="resetAll()" style="max-width:280px;margin:0 auto">🔄 Alles nochmal wiederholen</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="botnav">
  <button class="bbt on" id="nav-h" onclick="goHome()">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Start
  </button>
  <button class="bbt" id="nav-v" onclick="goVoc()">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Vokabeln
  </button>
  <button class="bbt" id="nav-g" onclick="goGram()">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Grammatik
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  DEADLINE + COUNTDOWN
// ═══════════════════════════════════════════════
const DEADLINE = new Date('2026-05-28T10:30:00');

function tick(){
  const diff = DEADLINE - Date.now();
  if(diff <= 0){
    ['d','h','m','s'].forEach(u=>{
      document.getElementById('cdn-'+u).textContent='00';
      document.getElementById('cd'+u).classList.add('urg');
    });
    return;
  }
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  document.getElementById('cdn-d').textContent=String(d).padStart(2,'0');
  document.getElementById('cdn-h').textContent=String(h).padStart(2,'0');
  document.getElementById('cdn-m').textContent=String(m).padStart(2,'0');
  document.getElementById('cdn-s').textContent=String(s).padStart(2,'0');
  const sn=document.getElementById('cdn-s');
  sn.style.transform='scale(1.2)';setTimeout(()=>sn.style.transform='',150);
  if(d===0&&h<12){
    document.getElementById('cds').classList.add('urg');
    document.getElementById('cdh').classList.add('urg');
  }
}
setInterval(tick,1000); tick();

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let S={pts:0,streak:0};
function saveS(){try{localStorage.setItem('sa26s',JSON.stringify(S));}catch(e){}}
function loadS(){try{const d=JSON.parse(localStorage.getItem('sa26s')||'{}');if(d.pts)S.pts=d.pts;if(d.streak)S.streak=d.streak;}catch(e){}}

function getMastery(id){try{return JSON.parse(localStorage.getItem('sa26_'+id)||'{"done":false,"tries":0}');}catch(e){return{done:false,tries:0};}}
function setMastery(id,done){
  const m=getMastery(id);
  m.tries++;if(done)m.done=true;
  try{localStorage.setItem('sa26_'+id,JSON.stringify(m));}catch(e){}
}
function isDone(id){return getMastery(id).done;}
function isUnlocked(id){return id===0||isDone(id-1);}

// ═══════════════════════════════════════════════
//  TOPICS
// ═══════════════════════════════════════════════
const TOPICS=[
  {id:0,ico:'🌍',title:'Fakten & Vokabeln',sub:'South Africa — Wörter & Geschichte',col:'--gr'},
  {id:1,ico:'🔵',title:'Present Participle',sub:'verb + -ing nach Wahrnehmungsverben (G5)',col:'--bl'},
  {id:2,ico:'🟠',title:'Past Perfect',sub:'had + 3. Form — Vorvergangenheit (G6)',col:'--or'},
  {id:3,ico:'🟢',title:'Passive Voice',sub:'was/were + 3. Form — Passiv Simple Past (G7)',col:'--gr'},
  {id:4,ico:'🏆',title:'Alles zusammen',sub:'Gemischte Aufgaben — wie in der Arbeit',col:'--pu'},
];

// ═══════════════════════════════════════════════
//  LEARN CONTENT
// ═══════════════════════════════════════════════
const LEARN={
0:`<div class="learn-hero fi" style="background:linear-gradient(135deg,#0c1f12,#09090f);border:1px solid rgba(53,212,152,.18)">
  <div class="lbadge" style="background:rgba(53,212,152,.12);color:var(--gr)">Thema 1</div>
  <h1>🌍 Fakten & Vokabeln</h1>
  <p>Was du über South Africa wissen musst</p>
</div>
<div class="card fi">
  <div class="card-title"><span class="badge" style="background:var(--lgr);color:var(--gr)">Fakten</span> Wichtige Fakten für die Arbeit</div>
  <table class="t">

  <div class="formula" style="border-color:rgba(53,212,152,.28);background:#081612">was (Singular) / were (Plural) + past participle (3. Form)<small>Optional: + by [wer es getan hat]</small></div>

</div>

function calcPlan(){
  const now=Date.now();
  const diff=DEADLINE-now;
  const hoursLeft=diff/3600000;
  const doneCount=TOPICS.filter(t=>isDone(t.id)).length;
  const remaining=TOPICS.length-doneCount;
  if(remaining===0) return null;
  const hPerTopic=hoursLeft/remaining;
  return {hoursLeft:Math.round(hoursLeft),remaining,hPerTopic:Math.round(hPerTopic*10)/10};
}

        <div class="stat"><div class="stat-n" style="color:var(--pu)">${S.pts}</div><div class="stat-l">Punkte ⭐</div></div>

      ${TOPICS.map(t=>{
        const d=isDone(t.id);
        const locked=!isUnlocked(t.id);
        const m=getMastery(t.id);
        const tagTxt=d?'✓ Fertig':locked?'🔒 Gesperrt':m.tries>0?'↺ Wiederholen':'▶ Starten';
        const tagCls=d?'done':locked?'locked':m.tries>0?'retry':'go';
        return`<div class="titem ${d?'done':locked?'locked':m.tries>0?'active':''}" onclick="${locked?"showToast('🔒 Schließe erst das vorherige Thema ab!')":``goTopic(${t.id})``}">

function buildPills(){
  document.getElementById('pills').innerHTML=TOPICS.map(t=>{
    const d=isDone(t.id);
    const locked=!isUnlocked(t.id);
    const cls=d?'done':locked?'locked':'';
    return`<div class="pill ${cls}" onclick="${locked?'':``goTopic(${t.id})``}">
      <div class="pill-dot"></div>${t.ico} ${t.title.split(' (')[0]}${d?' ✓':''}
    </div>`;
  }).join('');
}

let CUR=null;
let QS={pool:[],idx:0,correct:0,wrong:[]};
let QT=null;

function goTopic(id){
  CUR=TOPICS[id];
  showSc('sc-learn');
  navHL('');
  document.getElementById('learn-body').innerHTML=LEARN[id]+
    `<button class="btn-main blue fi" style="margin-top:4px" onclick="startQuiz(${id})">
      Quiz starten — ${QUIZZES[id].length} Fragen ➜
    </button>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function startQuiz(id){
  CUR=TOPICS[id];
  QS={pool:shuf([...QUIZZES[id]]),idx:0,correct:0,wrong:[]};
  showSc('sc-quiz');
  renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderQ(){
  const q=QS.pool[QS.idx];
  const total=QS.pool.length;
  const pct=Math.round((QS.idx/total)*100);

  let inputHTML='';
  if(q.type==='mc'){
    inputHTML=`<div class="opts">${q.opts.map(o=>`<button class="opt" onclick="doMC(this,'${esc(o)}','${esc(q.ans)}','${esc(q.ex)}')">${o}</button>`).join('')}</div>`;
  } else {
    inputHTML=`<input class="fill-inp" id="fi" placeholder="Antwort eingeben..." autocomplete="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter')doFill('${esc(q.ans)}','${esc(q.ex)}')">
    <button class="chk-btn" onclick="doFill('${esc(q.ans)}','${esc(q.ex)}')">Prüfen ✓</button>`;
  }

  document.getElementById('quiz-body').innerHTML=`
    <div class="qwrap fi">
      <div class="qhead">
        <div class="qtitle">${CUR.ico} ${CUR.title}</div>
        <div class="qcount">${QS.idx+1}/${total}</div>
      </div>
      <div class="qbar"><div class="qbar-fill" style="width:${pct}%"></div></div>
      <div class="qtext">${q.q}</div>
      ${q.de?`<div class="qde">🇩🇪 ${q.de}</div>`:''}
      ${inputHTML}
      <div class="qfb" id="qfb"></div>
      <div class="qex" id="qex">💡 ${q.ex}</div>
    </div>`;
}

function doMC(btn,chosen,correct,explain){
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  btn.classList.add(ok?'ok':'no');
  if(!ok) document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('ok');});
  document.getElementById('qfb').textContent=ok?'✅ Richtig!':'❌ Falsch!';
  document.getElementById('qfb').className='qfb '+(ok?'ok':'no');
  document.getElementById('qex').classList.add('show');
  handleAns(ok);
}

function doFill(correct,explain){
  const inp=document.getElementById('fi');
  if(!inp)return;
  inp.disabled=true;
  const val=inp.value.trim().toLowerCase().replace(/['']/g,"'");
  const cor=correct.trim().toLowerCase();
  const ok=val===cor||val===cor.replace(/'/g,"'");
  inp.classList.add(ok?'ok':'no');
  document.getElementById('qfb').textContent=ok?'✅ Richtig!':'❌ Falsch! Richtig: '+correct;
  document.getElementById('qfb').className='qfb '+(ok?'ok':'no');
  document.getElementById('qex').classList.add('show');
  if(document.querySelector('.chk-btn')) document.querySelector('.chk-btn').disabled=true;
  handleAns(ok);
}

function handleAns(ok){
  if(ok){QS.correct++;S.streak++;S.pts+=10;}
  else{S.streak=0;QS.wrong.push(QS.pool[QS.idx]);}
  saveS();
  clearTimeout(QT);
  QT=setTimeout(()=>{
    QS.idx++;
    if(QS.idx>=QS.pool.length) showResult();
    else{renderQ();window.scrollTo({top:0,behavior:'smooth'});}
  },ok?1500:2800);
}

function showResult(){
  const total=QS.pool.length;
  const pct=Math.round((QS.correct/total)*100);
  const passed=pct>=80;
  setMastery(CUR.id,passed);
  buildHome();
  const allDone=TOPICS.every(t=>isDone(t.id));

  const wrongHTML=QS.wrong.length?`<div class="wrong-list">
    <div style="font-size:10px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px">Falsch beantwortet:</div>
    ${QS.wrong.map(w=>`<div>• ${w.q}</div>`).join('')}
  </div>`:'';

  if(passed){
    const nextId=CUR.id+1;
    document.getElementById('quiz-body').innerHTML=`<div class="gate pass fi">
      <div class="big">${pct===100?'🏆':pct>=90?'🌟':'✅'}</div>
      <h2>${pct}% — Bestanden!</h2>
      <p>${QS.correct}/${total} richtig. ${pct===100?'Perfekt!':pct>=90?'Ausgezeichnet!':'Gut gemacht!'}<br>${allDone?'Du hast ALLE Themen abgeschlossen!':'Nächstes Thema ist jetzt freigeschaltet!'}</p>
      ${allDone
        ?`<button class="btn-main green" onclick="showSc('sc-done');navHL('')">🏆 Zur Siegerehrung!</button>`
        :`<button class="btn-main green" onclick="goTopic(${nextId})">Weiter → Thema ${nextId+1} ➜</button>`}
      <button class="btn-sec" onclick="startQuiz(${CUR.id})">🔄 Nochmal üben</button>
    </div>`;
  } else {
    const needed=Math.ceil(total*0.8);
    document.getElementById('quiz-body').innerHTML=`<div class="gate fail fi">
      <div class="big">😤</div>
      <h2>${pct}% — Noch nicht bestanden</h2>
      <p>Du brauchst <strong>mindestens 80%</strong> (${needed}/${total} richtig).<br>Du hattest ${QS.correct}/${total}. Lies nochmal durch und probier es dann wieder!</p>
      ${wrongHTML}
      <button class="btn-main orange" onclick="goTopic(${CUR.id})">📖 Nochmal durchlesen</button>
      <button class="btn-sec" onclick="startQuiz(${CUR.id})">🔄 Quiz direkt wiederholen</button>
    </div>`;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

      btn.addEventListener('click',()=>{
        document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
        const ok=btn.dataset.ans===w[1];
        btn.classList.add(ok?'ok':'no');
        if(!ok)document.querySelectorAll('.opt').forEach(b=>{if(b.dataset.ans===w[1])b.classList.add('ok');});
        document.getElementById('vqfb').textContent=ok?'✅ Richtig!':'❌ Falsch! → '+w[1];
        document.getElementById('vqfb').className='qfb '+(ok?'ok':'no');
        if(ok)score++;
        setTimeout(()=>{idx++;go();window.scrollTo({top:0,behavior:'smooth'});},ok?1200:2000);
      });
    });
  }
  go();
}

function showSc(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
function navHL(id){document.querySelectorAll('.bbt').forEach(b=>b.classList.remove('on'));if(id)document.getElementById(id)?.classList.add('on');}
function goHome(){navHL('nav-h');buildHome();showSc('sc-home');window.scrollTo({top:0,behavior:'smooth'});}
function shuf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
let toastT;
function showToast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),2300);}
function resetAll(){if(confirm('Wirklich alles zurücksetzen?')){['sa26s','sa26_0','sa26_1','sa26_2','sa26_3','sa26_4'].forEach(k=>localStorage.removeItem(k));location.reload();}}
